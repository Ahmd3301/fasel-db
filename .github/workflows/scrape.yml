name: Fasel DB Scraper

on:
  schedule:
    - cron: "*/10 * * * *"   # كل 10 دقائق
  workflow_dispatch:           # تشغيل يدوي

permissions:
  contents: write

jobs:
  scrape-movies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run spider
        run: cd fasel && scrapy crawl movies
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "db: update movies [skip ci]"
          file_pattern: "data/movies.json"
